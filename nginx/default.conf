server {
    listen 80;
    server_name api.auctionplatform.tinhlelaptrinh.id.vn;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name api.auctionplatform.tinhlelaptrinh.id.vn;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/api.auctionplatform.tinhlelaptrinh.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.auctionplatform.tinhlelaptrinh.id.vn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ========== Security Headers ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========== Rate Limiting ==========
    # Định nghĩa zone cho rate limit
    limit_req_zone $binary_remote_addr zone=auction_api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=auction_conn:10m;

    # Logging
    access_log /var/log/nginx/auction-access.log;
    error_log /var/log/nginx/auction-error.log;

    location / {
          # ----- Rate Limiting -----
        limit_req zone=auction_api burst=20 nodelay;
        limit_conn auction_conn 10;
        limit_req_status 429;  # Too Many Requests
        
        proxy_pass http://auction-backend-v1:8081;  # ✅ Đổi thành 8081
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /health {
        proxy_pass http://auction-backend-v1:8081/health;  # ✅ Đổi thành 8081
        access_log off;
    }

    # Block malicious requests
    location ~* \.(php|env|htaccess|htpasswd|git|svn)$ {
        return 403;
    }
    location ~* /(vendor|composer|artisan|wp-admin|wp-includes|eval-stdin\.php) {
        return 403;
    }
    location ~* /\.(env|git|svn) {
        return 403;
    }
}