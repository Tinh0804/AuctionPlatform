server:
  port: ${SERVER_PORT:8080}
  servlet:
     context-path: "/AuctionPlatform"
spring:
  application:
    name: AuctionPlatform
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      database: ${REDIS_DATABASE:1}
  cache:
    type: redis
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auctiondb}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:@Tinh0804}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    format-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD:12345}
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            grant-type: authorization_code
            scope:
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI:}
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:}
            client-secret: ${FACEBOOK_CLIENT_SECRET:}
            scope:
              - public_profile
              - email
            redirect-uri: ${FACEBOOK_REDIRECT_URI:}
            token-uri: https://graph.facebook.com/v17.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture

        provider:
          #                    do google đã có provider mặt định
          facebook:
            authorization-uri: https://www.facebook.com/v20.0/dialog/oauth
            token-uri: https://graph.facebook.com/v20.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
            user-name-attribute: id
jwt:
  signerKey: ${JWT_SIGNER_KEY:default-jwt-signer-key-that-is-at-least-256-bits-long!}
  valid-duration : 3600
  refreshable-duration : 36000

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  fptai:
    key: ${FPTAI_KEY:}
  firebase:
    config-path: "classpath:firebase-admin.json"

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:}
  api_key: ${CLOUDINARY_API_KEY:}
  api_secret: ${CLOUDINARY_API_SECRET:}

